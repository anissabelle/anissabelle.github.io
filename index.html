<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Head content to mimic behavior of native mobile applications -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <meta name="apple-mobile-web-app-capable" content="yes"> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black"> 

    <link rel="icon" type="image/x-icon" href="css/weather_app_icon.png"> <!-- Icon for desktop browsers -->
    <link rel="apple-touch-icon" href="css/weather_app_icon.png"> <!-- Icon for phone when added to home screen -->

    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
    <div class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="card col-12 col-md-8 col-lg-5 border border-secondary">
            <div class="card-body text-center">
                <div class="card mt-5 border border-secondary">
                    <div class="card-body">
                        <h1 class="fs-1 fw-bold" id="h1Time"></h1> <!-- Displaying time with "Cookeville" text -->
                    </div>
                </div>
                <br>
                <h2 id="h2Current_temp" class="fs-1"></h2> <!-- Current temperature -->
                <h3 id="h3Apparent_temp" class="fs-5"></h3> <!-- Apparent temperature -->
                <br>
                <!-- Weather code icon and respective text -->
                <!-- Used float:right and float:left to align weather icon next to text t-->
                 <!-- aria-hidden because there is text which corresponds with the weather code icon -->
                    <div class="row">
                        <div class="col-5">
                            <i id="weatherCodeIcon" style="float:right; font-size:xxx-large" aria-hidden="true"></i>
                        </div>
                        <div class="col">
                            <h4 id="h2WeatherConditions" class="mt-3 mb-5 fs-2" style="float:left"></h4>
                        </div>
                    </div>
                    <br>
                    <div class="row mb-5">
                        <div class="col">
                            <h5>Humidity</h5> <!-- Humidity -->
                            <h5 id="h5Current_humidity"></h5>
                        </div>
                        <div class="col">
                            <h5>UV Index</h5>   <!-- UV Index -->
                            <h5 id="h5UV"></h5>
                        </div>
                        <div class="col">
                            <h5>Precipitation</h5>  <!-- Precipitation -->
                            <h5 id="h5Precipitation"></h5>
                        </div>
                    </div>
                    <!-- Hourly temperatures for current hour and next 4 -->
                    <div>
                        <div class="card border border-secondary mb-5">
                            <div class="card-body">
                                <div class="row fs-5">
                                     <div class="col">
                                        <p id="hour0"></p>
                                        <p id="hour0Temp"></p>
                                    </div>
                                    <div class="col">
                                        <p id="hour1"></p>
                                        <p id="hour1Temp"></p>
                                    </div>
                                    <div class="col">
                                        <p id="hour2"></p>
                                        <p id="hour2Temp"></p>
                                    </div>
                                    <div class="col">
                                        <p id="hour3"></p>
                                        <p id="hour3Temp"></p>
                                    </div>
                                    <div class="col">
                                        <p id="hour4"></p>
                                        <p id="hour4Temp"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center text-white">
    <p>Weather data is provided by <a href="https://open-meteo.com/en/docs" class="link-underline-secondary text-white">Open-Meteo</a></p>
</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/weather.js"></script>
</body>
</html>
